<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayer CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link class="rounded-circle" rel="icon" type="image/png" href="https://mayer-pro.com/wp-content/themes/mayerpro/assets/images/logo-min.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark mb-4 py-2 shadow-sm" style="background-color: #dc3545;">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <span class="fw-bold text-white text-uppercase" style="font-size: 1.4rem; letter-spacing: 1px;">MAYER PRO</span>
                <span class="fw-normal text-white border-start ps-3 ms-3 opacity-75" style="font-size: 1.2rem; letter-spacing: 0.5px;">CRM</span>
            </a>
            {% if session.get('logged_in') %}
                <a href="/logout" class="btn btn-sm btn-outline-light px-3 fw-bold">Вийти</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
