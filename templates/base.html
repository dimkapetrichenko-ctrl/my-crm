<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayer CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="icon" type="image/png" href="https://mayer-pro.com/wp-content/themes/mayerpro/assets/images/logo-min.png">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4 py-2 shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="https://mayer-pro.com/wp-content/themes/mayerpro/assets/images/logo.png" alt="MAYER-PRO Logo" height="35" class="d-inline-block align-top me-3" style="filter: brightness(0) invert(1);">
                <span class="fw-bold text-white border-start ps-3 ms-1" style="font-size: 1.2rem; letter-spacing: 0.5px;">CRM</span>
            </a>
            {% if session.get('logged_in') %}
                <a href="/logout" class="btn btn-sm btn-outline-light px-3">Вийти</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
