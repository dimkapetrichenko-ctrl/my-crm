<div class="modal fade" id="editClientModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-md modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content" style="font-size: 0.9rem;">
            <div class="modal-header bg-dark text-white py-2">
                <h5 class="modal-title" style="font-size: 1.1rem;">✏️ Редагувати картку компанії</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form action="{{ url_for('edit_client', client_id=client.id) }}" method="POST" class="d-flex flex-column" style="max-height: 75vh;">
                <div class="modal-body p-3">
                    <div class="mb-2">
                        <label class="form-label fw-bold mb-1">Назва компанії</label>
                        <input type="text" name="name" class="form-control form-control-sm" value="{{ client.name }}" required>
                    </div>
                    
                    <div class="mb-2">
                        <label class="form-label fw-bold mb-1">Тип покупця</label>
                        <select name="buyer_type" class="form-select form-select-sm">
                            <option value="" {% if not client.buyer_type %}selected{% endif %}>-- Оберіть тип --</option>
                            {% for t in ['інтернет-магазин', 'гуртовий клієнт', 'фермерське господарство', 'виробник', 'надання послуг', 'роздрібний покупець', 'Дилер сг техніки'] %}
                            <option value="{{ t }}" {% if client.buyer_type == t %}selected{% endif %}>{{ t }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-2">
                        <label class="form-label fw-bold mb-1">Пріоритетні бренди</label>
                        {% set cb = client.brands or '' %}
                        <div class="d-flex flex-wrap gap-2 bg-white p-2 border rounded">
                            <div class="form-check form-check-inline mb-0"><input class="form-check-input" type="checkbox" name="brands" value="Vaderstad" {% if 'Vaderstad' in cb %}checked{% endif %}><label class="form-check-label small">Vaderstad</label></div>
                            <div class="form-check form-check-inline mb-0"><input class="form-check-input" type="checkbox" name="brands" value="Gaspardo" {% if 'Gaspardo' in cb %}checked{% endif %}><label class="form-check-label small">Gaspardo</label></div>
                            <div class="form-check form-check-inline mb-0"><input class="form-check-input" type="checkbox" name="brands" value="Pottinger" {% if 'Pottinger' in cb %}checked{% endif %}><label class="form-check-label small">Pottinger</label></div>
                            <div class="form-check form-check-inline mb-0"><input class="form-check-input" type="checkbox" name="brands" value="Kverneland" {% if 'Kverneland' in cb %}checked{% endif %}><label class="form-check-label small">Kverneland</label></div>
                            <div class="form-check form-check-inline mb-0"><input class="form-check-input" type="checkbox" name="brands" value="HORSCH" {% if 'HORSCH' in cb %}checked{% endif %}><label class="form-check-label small">HORSCH</label></div>
                            <div class="form-check form-check-inline mb-0"><input class="form-check-input" type="checkbox" name="brands" value="інший" {% if 'інший' in cb %}checked{% endif %}><label class="form-check-label small">інший</label></div>
                        </div>
                    </div>

                    <div class="mb-2">
                        <label class="form-label fw-bold mb-1">Веб-сайт</label>
                        <input type="text" name="website" class="form-control form-control-sm" value="{{ client.website or '' }}">
                    </div>
                    
                    <div class="mb-2">
                        <label class="form-label fw-bold mb-1">Країна</label>
                        <input type="text" name="country" class="form-control form-control-sm" value="{{ client.country or '' }}">
                    </div>
                    
                    <div class="mb-2">
                        <label class="form-label fw-bold mb-1">Адреса</label>
                        <input type="text" name="address" class="form-control form-control-sm" value="{{ client.address or '' }}">
                    </div>

                    <div class="p-2 border rounded bg-light mb-2">
                        <span class="badge bg-danger mb-2">👤 Контактна особа №1</span>
                        <div class="row g-2">
                            <div class="col-12"><input type="text" name="contact_person" class="form-control form-control-sm" placeholder="Ім'я" value="{{ client.contact_person or '' }}"></div>
                            <div class="col-6"><input type="text" name="phone" class="form-control form-control-sm" placeholder="Телефон" value="{{ client.phone or '' }}"></div>
                            <div class="col-6"><input type="email" name="email" class="form-control form-control-sm" placeholder="Email" value="{{ client.email or '' }}"></div>
                        </div>
                    </div>

                    <div class="p-2 border rounded bg-light">
                        <span class="badge bg-danger mb-2">👤 Контактна особа №2</span>
                        <div class="row g-2">
                            <div class="col-6"><input type="text" name="contact_person_2" class="form-control form-control-sm" placeholder="Ім'я" value="{{ client.contact_person_2 or '' }}"></div>
                            <div class="col-6"><input type="text" name="position_2" class="form-control form-control-sm" placeholder="Посада" value="{{ client.position_2 or '' }}"></div>
                            <div class="col-6"><input type="text" name="phone_2" class="form-control form-control-sm" placeholder="Телефон" value="{{ client.phone_2 or '' }}"></div>
                            <div class="col-6"><input type="email" name="email_2" class="form-control form-control-sm" placeholder="Email" value="{{ client.email_2 or '' }}"></div>
                        </div>
                    </div>
                </div>
                
                <div class="modal-footer bg-light py-2 w-100">
                    <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Закрити</button>
                    <button type="submit" class="btn btn-sm btn-danger px-4 fw-bold">Зберегти зміни</button>
                </div>
            </form>
        </div>
    </div>
</div>
